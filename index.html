<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Agence.ch</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="agence180.svg">
    <style>
        /* On place le CSS spécifique au formulaire ici pour ne pas polluer le reste du site */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        /* ... (Colle ici tout le code CSS que tu as trouvé sur Uiverse) ... */
        .container {
            height: fit-content;
            display: flex;
            box-shadow: 0px 187px 75px rgba(0, 0, 0, 0.01), 0px 105px 63px rgba(0, 0, 0, 0.05), 0px 47px 47px rgba(0, 0, 0, 0.09), 0px 12px 26px rgba(0, 0, 0, 0.1), 0px 0px 0px rgba(0, 0, 0, 0.1);
            border-radius: 9px;
            background: white;
        }
        /* Ajout d'un petit bouton retour */
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #5F5D6B;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← Retour au site</a>

    <div class="container">
        <div class="login-form">
            <div class="header">
                <img src="agence180.svg" alt="Logo" style="height: 40px; margin-bottom: 10px;">
                <label class="title">Espace Membre</label>
                <p class="description">Connectez-vous pour accéder à vos outils de gestion.</p>
            </div>
            
            <div class="input_container">
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M7 8.5L9.94202 10.2394C11.6572 11.2535 12.3428 11.2535 14.058 10.2394L17 8.5" stroke="#141B34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M2.01577 13.4756C2.08114 16.5412 2.11383 18.0739 3.24496 19.2094C4.37608 20.3448 5.95033 20.3843 9.09883 20.4634C11.0393 20.5122 12.9607 20.5122 14.9012 20.4634C18.0497 20.3843 19.6239 20.3448 20.7551 19.2094C21.8862 18.0739 21.9189 16.5412 21.9842 13.4756C22.0053 12.4899 22.0053 11.5101 21.9842 10.5244C21.9189 7.45886 21.8862 5.92609 20.7551 4.79066C19.6239 3.65523 18.0497 3.61568 14.9012 3.53657C12.9607 3.48781 11.0393 3.48781 9.09882 3.53656C5.95033 3.61566 4.37608 3.65521 3.24495 4.79065C2.11382 5.92608 2.08114 7.45885 2.01576 10.5244C1.99474 11.5101 1.99475 12.4899 2.01577 13.4756Z" stroke="#141B34" stroke-width="1.5" stroke-linejoin="round"></path>
                </svg>
                <input id="email_field" class="input_field" type="text" placeholder="Email admin">
            </div>

            <div class="input_container">
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M6 9V6.5C6 4.01472 8.01472 2 10.5 2C12.9853 2 15 4.01472 15 6.5V9" stroke="#141B34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M18 11C18 15.5 18 22 10 22C2 22 2 15.5 2 11C2 6.5 5.5 3 10 3C14.5 3 18 6.5 18 11Z" stroke="#141B34" stroke-width="1.5"></path>
                </svg>
                <input id="password_field" class="input_field" type="password" placeholder="Mot de passe">
            </div>

            <button class="sign-in_btn" type="submit">
                <span>Se connecter</span>
            </button>
        </div>

        <div class="testimonial">
            <p>"L'outil de gestion nous permet de piloter l'agence avec une précision incroyable."</p>
            <div class="user-profile-picture"></div>
            <div class="user">
                <span class="username">Equipe Dev</span>
                <span class="occupation">Agence.ch</span>
            </div>
        </div>
    </div>
</body>
</html>
